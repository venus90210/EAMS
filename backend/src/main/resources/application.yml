spring:
  application:
    name: eams-backend

  # ── Base de datos ─────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eams_dev}
    username: ${SPRING_DATASOURCE_USERNAME:eams}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update            # Crear/actualizar schema (temporal para prueba)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway (migraciones) ──────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}

  # ── File Upload — OWASP A06 (Vulnerable Components) ─────────────────────
  servlet:
    multipart:
      max-file-size: 10MB         # Límite por archivo (prevenir DoS)
      max-request-size: 20MB      # Límite por request (prevenir DoS)

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

# ── Email ─────────────────────────────────────────────────────────────────
email:
  smtp:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
  from: ${EMAIL_FROM:noreply@eams.edu.co}

# ── Actuator (healthcheck para Docker) ───────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.eams: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
